<!DOCTYPE html>
<html lang="tr">

<head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-C92QGG454D"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());
    
      gtag('config', 'G-C92QGG454D');
    </script>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RitmiQ – Oyna</title>
    <link rel="stylesheet" href="/static/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        .top-nav {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 99;
            padding: 0.9rem 5%;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(8, 8, 8, 0.7);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid rgba(255, 255, 255, 0.07);
        }

        .top-nav a {
            color: #b3b3b3;
            text-decoration: none;
            font-size: 0.9rem;
            transition: color 0.2s;
        }

        .top-nav a:hover {
            color: #1DB954;
        }

        .top-nav .logo {
            font-size: 1.2rem;
            font-weight: 700;
            color: white;
        }

        .top-nav .logo span {
            color: #1DB954;
        }

        main.container {
            padding-top: 5rem;
        }

        /* ── Buy Me a Coffee ── */
        .bmac {
            position: fixed;
            bottom: 1.5rem;
            right: 1.5rem;
            z-index: 200;
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 11px 18px;
            background: rgba(20, 20, 20, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50px;
            color: #fff;
            text-decoration: none;
            font-size: 0.82rem;
            font-weight: 600;
            backdrop-filter: blur(16px);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
            transition: transform 0.25s, border-color 0.25s, box-shadow 0.25s;
            font-family: 'Outfit', sans-serif;
        }

        .bmac:hover {
            transform: translateY(-3px);
            border-color: rgba(255, 213, 79, 0.4);
            box-shadow: 0 6px 28px rgba(0, 0, 0, 0.5);
        }

        .bmac svg {
            width: 18px;
            height: 18px;
            flex-shrink: 0;
        }

        /* ── Lucky Button ── */
        .lucky-btn {
            width: 100%;
            margin-top: 10px;
            padding: 13px 36px;
            background: linear-gradient(135deg, #0d9e43, #1DB954);
            border: none;
            border-radius: 50px;
            color: #000;
            font-weight: 700;
            font-size: 1rem;
            font-family: 'Outfit', sans-serif;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            transition: filter 0.25s, transform 0.25s, box-shadow 0.25s;
            box-shadow: 0 0 22px rgba(29, 185, 84, 0.25);
        }

        .lucky-btn:hover {
            filter: brightness(1.1);
            transform: translateY(-3px);
            box-shadow: 0 0 36px rgba(29, 185, 84, 0.45);
        }

        .lucky-btn:active {
            transform: translateY(0);
        }

        .lucky-btn.spinning {
            animation: luckyPulse 0.6s ease infinite alternate;
        }

        @keyframes luckyPulse {
            from {
                filter: brightness(1);
            }

            to {
                filter: brightness(1.3);
            }
        }

        /* ── Result icon SVG ── */
        .result-emoji {
            width: 56px;
            height: 56px;
            margin: 0 auto 0.8rem;
        }

        .result-emoji svg {
            width: 100%;
            height: 100%;
        }

        /* ── Summary icon dots ── */
        .summary-icon {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .icon-correct {
            background: #1DB954;
            box-shadow: 0 0 6px rgba(29, 185, 84, 0.5);
        }

        .icon-wrong {
            background: #ef4444;
            box-shadow: 0 0 6px rgba(239, 68, 68, 0.4);
        }
    </style>
    
    <!-- Google Reader Revenue Manager -->
    <script async type="application/javascript" src="https://news.google.com/swg/js/v1/swg-basic.js"></script>
    <script>
        (self.SWG_BASIC = self.SWG_BASIC || []).push(basicSubscriptions => {
            basicSubscriptions.init({
                type: "NewsArticle",
                isPartOfType: ["Product"],
                isPartOfProductId: "CAowx9XKDA:openaccess",
                clientOptions: { theme: "light", lang: "tr" },
            });
        });
    </script>
</head>

<body>
    <nav class="top-nav">
        <a href="/" class="logo">Ritmi<span>Q</span></a>
        <a href="/">← Ana Sayfa</a>
    </nav>

    <div class="background-glow"></div>

    <main class="container">
        <header>
            <h1>Ritmi<span>Q</span></h1>
            <p>Sanatçıyı seç, 10 şarkıyı tahmin et!</p>
        </header>

        <!-- Kurulum Ekranı -->
        <section id="setup-screen" class="glass-card">
            <div class="input-group">
                <label for="artist-search">Sanatçı Ara</label>
                <div class="search-box">
                    <input type="text" id="artist-search" placeholder="Örn: The Weeknd, Tarkan..." autocomplete="off">
                    <div id="search-results" class="results-dropdown hidden"></div>
                </div>
            </div>

            <div class="input-group">
                <label>Zorluk Seviyesi</label>
                <div class="difficulty-selector">
                    <button class="diff-btn active" data-level="easy">Kolay</button>
                    <button class="diff-btn" data-level="medium">Orta</button>
                    <button class="diff-btn" data-level="hard">Zor</button>
                </div>
            </div>

            <button id="start-game" class="primary-btn" disabled>Oyunu Başlat</button>
            <button id="lucky-btn" class="lucky-btn"> Şansıma Oyna</button>
        </section>

        <!-- Oyun Ekranı -->
        <section id="game-screen" class="glass-card hidden">
            <div class="quiz-header">
                <div class="question-counter">
                    Soru <span id="current-q">1</span> / <span id="total-q">10</span>
                </div>
                <div class="playing-indicator">
                    <div class="wave-container">
                        <div class="wave"></div>
                        <div class="wave"></div>
                        <div class="wave"></div>
                        <div class="wave"></div>
                        <div class="wave"></div>
                    </div>
                    <span id="game-status-text">Dinle ve bil!</span>
                </div>
            </div>

            <div class="audio-visualizer">
                <div class="progress-bar-container">
                    <div id="playback-progress" class="progress-bar"></div>
                </div>
                <div class="time-info">0:00 / 0:05</div>
            </div>

            <div id="options-container" class="options-grid"></div>

            <!-- Soru göstergesi (1..10) -->
            <div id="question-tracker" class="question-tracker"></div>

            <button id="next-btn" class="primary-btn hidden" style="margin-top:1.2rem;">
                Sonraki Soru →
            </button>
        </section>

        <!-- Sonuç Ekranı -->
        <section id="result-screen" class="glass-card hidden">
            <div class="result-hero">
                <div class="result-emoji" id="result-emoji">🏆</div>
                <h2 id="result-title">Mükemmel!</h2>
                <p id="result-subtitle"></p>
            </div>

            <div class="score-display">
                <div class="score-box correct-box">
                    <span id="correct-count">0</span>
                    <label>Doğru</label>
                </div>
                <div class="score-box wrong-box">
                    <span id="wrong-count">0</span>
                    <label>Yanlış</label>
                </div>
            </div>

            <!-- Cevap özeti -->
            <div id="answer-summary" class="answer-summary"></div>

            <button id="show-note-btn" class="secondary-btn" style="margin-top:1.5rem;">Sanatçının Notunu Oku ✨</button>

            <button id="play-again" class="primary-btn" style="margin-top:1rem;">Yeni Oyun</button>
        </section>
    </main>

    <audio id="audio-player"></audio>
    <script src="/static/js/script.js"></script>



    <!-- Buy Me a Coffee -->
    <a href="https://www.buymeacoffee.com/salimcaner" target="_blank" rel="noopener" class="bmac">
        <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M18 8h1a4 4 0 0 1 0 8h-1" stroke="#FFD54F" stroke-width="2" stroke-linecap="round"
                stroke-linejoin="round" />
            <path d="M2 8h16v9a4 4 0 0 1-4 4H6a4 4 0 0 1-4-4V8z" stroke="#FFD54F" stroke-width="2"
                stroke-linecap="round" stroke-linejoin="round" />
            <line x1="6" y1="1" x2="6" y2="4" stroke="#FFD54F" stroke-width="2" stroke-linecap="round" />
            <line x1="10" y1="1" x2="10" y2="4" stroke="#FFD54F" stroke-width="2" stroke-linecap="round" />
            <line x1="14" y1="1" x2="14" y2="4" stroke="#FFD54F" stroke-width="2" stroke-linecap="round" />
        </svg>
        Kahve Ismarla
    </a>
</body>

</html>
